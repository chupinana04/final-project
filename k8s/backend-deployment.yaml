apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: dattitbx/photo-backend:v1
        imagePullPolicy: Always
        ports:
        - containerPort: 8081
        env:
        - name: DB_URL
          value: mongodb://mongodb:27017/photo_sharing
