services:
  mongodb:
    image: mongo:7
    container_name: final-project-mongodb
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: final-project-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DB_URL: mongodb://mongodb:27017/photo_sharing
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "8081:8081"
    volumes:
      - uploads:/app/public/images

  frontend:
    build:
      context: ./frontend
    container_name: final-project-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  mongo-data:
  uploads:
